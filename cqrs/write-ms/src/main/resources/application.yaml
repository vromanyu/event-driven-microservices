spring:
  application:
    name: write-ms

  datasource:
    username: write
    password: write
    url: jdbc:h2:mem:writeDb

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: true

  threads:
    virtual:
      enabled: true

server:
  port: 8086

kafka:
  bootstrap:
    server: localhost:29092
  topics:
    product: product-topic
