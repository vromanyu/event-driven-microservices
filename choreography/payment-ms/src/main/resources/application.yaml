spring:
  application:
    name: payment-ms
  datasource:
    username: payment
    password: payment
    url: jdbc:h2:mem:paymentDb
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: true
  threads:
    virtual:
      enabled: true

kafka:
  bootstrap:
    server: localhost:29092
  topics:
    order: order-topic
    payment: payment-topic

server:
  port: 8086